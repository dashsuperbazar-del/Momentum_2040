name: Weekly Signal Generator

on:
  schedule:
    - cron: '0 11 * * 1'   # Every Monday 4:30pm IST (11:00 UTC)
  workflow_dispatch:
    inputs:
      backfill_date:
        description: 'Backfill from date YYYY-MM-DD (leave empty for normal weekly run)'
        required: false
        default: ''

jobs:
  generate-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests openpyxl

      - name: Run signal or backfill
        run: |
          if [ -n "${{ github.event.inputs.backfill_date }}" ]; then
            echo "Running backfill from ${{ github.event.inputs.backfill_date }}"
            python scripts/generate_signal.py --backfill ${{ github.event.inputs.backfill_date }}
          else
            echo "Running weekly signal"
            python scripts/generate_signal.py
          fi

      - name: Commit signal.json
        run: |
          git config user.name "Freedom2040 Bot"
          git config user.email "bot@freedom2040"
          git add docs/signal.json
          git diff --staged --quiet || git commit -m "Signal update $(date '+%Y-%m-%d %H:%M')"
          git push
